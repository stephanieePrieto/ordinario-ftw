<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Glow Tech - Centro de Soporte</title>
</head>
<body>
    
    <h1>Centro de Soporte y Ayuda</h1>
    <p>¿Tienes alguna duda con tus cosméticos o un problema con tu entrega? Escríbenos:</p>

    <div styl="border: 2px solid purple; padding: 20px; width: 400px; display: inline-block; vertical-align: top;">
        <p>
            <label>Nombre del Cliente:</label><br>
            <input type="text" id="soporte-nombre" placeholder="Tu nombre">
        </p>
        <p>
            <label>Número de pedido:</label><br>
            <input type="text" id="soporte-pedido" placeholder="Ej. GT-9843">
        </p>
        <p>
            <label>Descripción del problema:</label><br>
            <textarea id="soporte-mensaje" rows="4" styl="width: 95%;" placeholder="Escribe aquí los detalles..."></textarea>
        </p>

        <button id="btn-enviar-reporte">Enviar Reporte</button>
        <button id="btn-inicio">Volver al Inicio</button>
    </div>

    <div style="border: 2px dashed purple; padding: 20px; width: 300px; display: inline-block; margin-left: 20px; vertical-align: top;">
        <h3>Tus Reportes Enviados</h3>
        <div id="historial-tickets">
            <p style="color: gray;">No has enviado ningún reporte en esta sesión.</p>
        </div>
    </div>

    <script src="soporte.js"></script>
</body>
</html>
