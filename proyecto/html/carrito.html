<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Beauty Lab - Mi Carrito</title>
    <link rel="stylesheet" href="../estilos.css">
</head>
<body>

    <header class="barra-navegacion">
        <div class="logo">Beauty Lab</div>
        <nav class="menu-enlaces">
            <a href="index.html">Inicio</a>
            <a href="catalogo.html">Catálogo</a>
            <a href="carrito.html" class="activo">Mi carrito</a>
            <a href="soporte.html">Soporte</a>
        </nav>
    </header>

    <main class="seccion-carrito">
        <h2>Tu Bolsa de Compras</h2>
        <p class="subtitulo-carrito">Revisa los cosméticos seleccionados antes de proceder al pago de alta gama.</p>

        <div class="contenedor-flexible-carrito">
            <div class="productos-carrito-lista">
                <table class="tabla-carrito">
                    <thead>
                        <tr>
                            <th>Producto</th>
                            <th>Precio</th>
                            <th>Acción</th>
                        </tr>
                    </thead>
                    <tbody id="items-carrito">
                        </tbody>
                </table>
            </div>

            <div class="resumen-pago-tarjeta">
                <h3>Resumen de Pedido</h3>
                <hr>
                <div class="fila-resumen">
                    <span>Envío:</span>
                    <span class="envio-gratis">¡Gratis!</span>
                </div>
                <hr>
                <div class="fila-resumen total-destacado">
                    <span id="gran-total">Total: $0.00</span>
                </div>
                
                <button id="btn-proceder-datos" class="btn-comprar-total">Proceder al Pago</button>
                <button id="btn-seguir-comprando" class="btn-vaciar">Seguir Comprando</button>
            </div>
        </div>
    </main>

    <footer class="pie-pagina">
        <div class="footer-copyright">
            &copy; 2026 Beauty Lab. Todos los derechos reservados.
        </div>
        <div class="footer-enlaces">
            <a href="#">Privacidad</a>
            <a href="#">Términos</a>
            <a href="#">Contacto</a>
        </div>
    </footer>

    <script src="../javascript/carrito.js"></script>
</body>
</html>
