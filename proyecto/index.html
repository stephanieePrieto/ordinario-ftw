<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Glow Me - Bienvenida</title>
    <link rel="stylesheet" href="estilos.css">
</head>
<body>
    <header class="barra-navegacion">
        <div class="logo">Beauty Lab</div>
        <nav class="menu-enlaces">
            <a href="index.html" class="activo">Inicio</a>
            <a href="catalogo.html">Catálogo</a>
            <a href="carrito.html">Mi carrito</a>
            <a href="soporte.html">Soporte</a>
        </nav>
    </header>


<section class="banner-navegacion">
        <div class="contenido-banner">
            <h1>Beauty Lab:<br>Resalta tu brillo</h1>
            <p>Descubre cosméticos para realzar tu belleza natural.</p>
            <p>Be pretty, Be confident, Be you</p>
            <button onclick="window.location.href='catalogo.html'">Explorar Catálogo</button>
        </div>

        <div class="imagen-banner-contenedor">
            <img src='imagenes/maquillaje.jpeg' alt="Cosméticos Glow Tech" class="foto-maquillaje-banner">
        </div>

    </section>

    <section class="seccion-categorias">
        <h2>Encuentra tu look perfecto</h2>
        <p class="subtitulo">Explora nuestras categorías de maquillaje para cada ocasión.</p>

        <div class="contenedor-esferas">
            <div class="tarjeta-categoria">
                <div class="esfera-imagen esfera-ojos"></div>
                <h3>Ojos</h3>
                <button id="btn-ojos">Ver Ojos</button>
            </div>


            <div class="tarjeta-categoria">
                <div class="esfera-imagen esfera-labios"></div>
                <h3>Labios</h3>
                <button id="btn-labios">Ver Labios</button>
            </div>

            <div class="tarjeta-categoria">
                <div class="esfera-imagen esfera-rostro"></div>
                <h3>Rostro</h3>
                <button id="btn-rostro">Ver Rostro</button>
            </div>
        </div>
    </section>

    <script src="portada.js"></script>
</body>
</html>
