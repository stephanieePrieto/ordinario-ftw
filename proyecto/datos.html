<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Glow Tech - Datos de Envío</title>
</head>
<body>
    
    <h1>Información de Entrega</h1>
    <p>Por favor, llena los siguientes campos para asegurar que tus cosméticos lleguen a la puerta de tu casa:</p>

    <div style="border: 2px solid purple; padding: 20px; width: 350px;">
        <p>
            <label>Nombre Completo:</label><br>
            <input type="text" id="campo-nombre" placeholder="Ej. Stephanie Prieto">
        </p>

        <p>
            <label>Correo Electrónico:</label><br>
            <input type="text" id="campo-correo" placeholder="ejemplo@correo.com">
        </p>

        <p>
            <label>Dirección de Envío:</label><br>
            <input type="text" id="campo-direccion" placeholder="Calle, Número y Colonia">
        </p>        
    </div>

    <br>
    <button id="btn-cancelar-registro">Regresar al Carrito</button>
    <button id="btn-guardar-datos">Continuar al Pago</button>

    <script src="datos.js"></script>
</body>
</html>
